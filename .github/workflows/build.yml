name: Build & Release

# 触发方式：
# 1) 推送 v 开头的 tag（如 v0.1.4）→ 打包并自动发布到 GitHub Release
# 2) 在 Actions 页面手动点 "Run workflow" → 只打包、产物存为 artifact（不发 Release）
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64
          - os: windows-latest
            label: win
            isWin: true
            buildArgs: '--win'
          # macOS Apple Silicon（arm64，原生编译）
          - os: macos-latest
            label: mac-arm64
            isWin: false
            buildArgs: '--mac --arm64'
          # macOS Intel（x64，原生编译，避免交叉编译 node-pty）
          - os: macos-13
            label: mac-x64
            isWin: false
            buildArgs: '--mac --x64'
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: src/ClaudeOne
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      # ---- 仅 Windows：下载随包携带的 Node / Git 安装器 ----
      # 这两个文件体积大、未入库，CI 上从官网下载后放进 build/，
      # 让打出的 Windows 包内置「一键安装 Node/Git」功能。
      - name: Download bundled installers (Windows)
        if: matrix.isWin
        shell: pwsh
        run: |
          $nodeUrl = "https://nodejs.org/dist/v20.19.5/node-v20.19.5-x64.msi"
          $gitUrl  = "https://github.com/git-for-windows/git/releases/download/v2.47.0.windows.1/Git-2.47.0-64-bit.exe"
          Invoke-WebRequest -Uri $nodeUrl -OutFile build/node-installer.msi
          Invoke-WebRequest -Uri $gitUrl  -OutFile build/git-installer.exe

      - name: Build app (electron-vite)
        run: npm run build

      - name: Package
        run: npx electron-builder ${{ matrix.buildArgs }} --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeOne-${{ matrix.label }}
          retention-days: 7
          path: |
            src/ClaudeOne/dist/*.exe
            src/ClaudeOne/dist/*.zip
            src/ClaudeOne/dist/*.dmg

  # ---- 仅打 tag 时：把两个系统的产物汇总，发布到 GitHub Release ----
  release:
    name: Publish Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
